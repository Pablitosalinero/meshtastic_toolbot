name: Build, Release and Publish

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Inject Version
        shell: bash
        run: |
          VERSION="1.0.${{ github.run_number }}"
          python -c "import re; f=open('meshtastic_toolbot/__init__.py', 'r+', encoding='utf-8'); content=f.read(); txt=re.sub(r'__version__ = .*', '__version__ = \"$VERSION\"', content); f.seek(0); f.write(txt); f.truncate(); f.close()"
          python -c "import re; f=open('pyproject.toml', 'r+', encoding='utf-8'); content=f.read(); txt=re.sub(r'version = .*', 'version = \"$VERSION\"', content); f.seek(0); f.write(txt); f.truncate(); f.close()"

      - name: Install PyInstaller
        run: uv pip install pyinstaller

      - name: Build Executable with PyInstaller
        run: uv run pyinstaller --onefile --name mtb main.py

      - name: Package executable
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            cd dist && tar -a -c -f ../mtb-windows.zip mtb.exe
          elif [ "${{ runner.os }}" = "macOS" ]; then
            cd dist && zip ../mtb-macos.zip mtb
          else
            cd dist && zip ../mtb-linux.zip mtb
          fi

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mtb_${{ runner.os }}
          path: mtb-*.zip
          retention-days: 7

  release-and-publish:
    name: Release and Publish Package
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Download all workflow run artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Inject Version (for packaging)
        shell: bash
        run: |
          VERSION="1.0.${{ github.run_number }}"
          python -c "import re; f=open('pyproject.toml', 'r+', encoding='utf-8'); content=f.read(); txt=re.sub(r'version = .*', 'version = \"$VERSION\"', content); f.seek(0); f.write(txt); f.truncate(); f.close()"

      - name: Build Python Package
        run: uv build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.0.${{ github.run_number }}"
          name: "Release v1.0.${{ github.run_number }}"
          draft: false
          prerelease: false
          files: |
            artifacts/*
            dist/*
          generate_release_notes: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
